name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-backend:
    name: Build & Test Backend (.NET)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./central_kitchen_backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      # Uncomment if you have test projects
      # - name: Test
      #   run: dotnet test --no-build --configuration Release

  build-frontend:
    name: Build & Test Frontend (Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./central_kitchen_frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: central-kitchen-app
          path: central_kitchen_frontend/build/app/outputs/flutter-apk/app-release.apk

      # Uncomment if you have test files
      # - name: Run tests
      #   run: flutter test
