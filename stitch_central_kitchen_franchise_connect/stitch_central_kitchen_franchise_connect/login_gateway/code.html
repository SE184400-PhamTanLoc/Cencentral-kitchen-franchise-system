<body class="flex flex-col min-h-screen bg-background">
<!-- Content Canvas (Main Login Area) -->
<main class="flex-grow flex items-center justify-center p-container-padding">
<!-- Login Card -->
<div class="w-full max-w-[440px] bg-surface-container-lowest rounded-xl border border-outline-variant p-10 shadow-sm flex flex-col items-center">
<!-- Brand Identity: Corporate Logo -->
<div class="mb-section-margin text-center">
<div class="inline-flex items-center justify-center bg-primary-container text-white w-16 h-16 rounded-xl mb-4 shadow-sm">
<span class="material-symbols-outlined text-4xl" data-icon="restaurant_menu">restaurant_menu</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight">KitchenFlow</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Enterprise Operations Portal</p>
</div>
<!-- Login Form -->
<form class="w-full space-y-element-gap" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div class="relative">
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-1.5 ml-1" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]" data-icon="mail">mail</span>
<input class="w-full h-12 pl-10 pr-4 bg-white border border-outline-variant rounded-lg font-body-md text-body-md focus:ring-2 focus:ring-primary-container focus:border-primary-container outline-none transition-all placeholder:text-outline" id="email" name="email" placeholder="manager@kitchenflow.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="relative">
<div class="flex justify-between items-center mb-1.5">
<label class="block font-label-lg text-label-lg text-on-surface-variant ml-1" for="password">Password</label>
<a class="font-label-lg text-label-lg text-secondary hover:underline transition-all" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]" data-icon="lock">lock</span>
<input class="w-full h-12 pl-10 pr-12 bg-white border border-outline-variant rounded-lg font-body-md text-body-md focus:ring-2 focus:ring-primary-container focus:border-primary-container outline-none transition-all placeholder:text-outline" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center px-1">
<input class="w-4 h-4 text-primary-container border-outline-variant rounded focus:ring-primary-container" id="remember" type="checkbox"/>
<label class="ml-2 font-body-md text-body-md text-on-surface-variant" for="remember">Remember this device</label>
</div>
<!-- Sign In Button -->
<button class="w-full h-12 bg-[#00236F] text-white font-title-md text-title-md rounded-lg hover:bg-primary-container active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-sm mt-4" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[18px]" data-icon="login">login</span>
</button>
</form>
<!-- SSO Options (Subtle secondary path) -->
<div class="w-full mt-8 flex flex-col items-center">
<div class="w-full flex items-center gap-4 mb-6">
<div class="h-px bg-outline-variant flex-grow"></div>
<span class="font-label-sm text-label-sm text-outline uppercase tracking-widest">Or access via</span>
<div class="h-px bg-outline-variant flex-grow"></div>
</div>
<div class="grid grid-cols-2 gap-3 w-full">

<div class="absolute -top-24 -right-24 w-96 h-96 bg-primary-fixed opacity-10 rounded-full blur-3xl"></div>
<div class="absolute -bottom-24 -left-24 w-96 h-96 bg-secondary-fixed opacity-10 rounded-full blur-3xl"></div>

<script>
        // Simple Interaction: Toggle Password Visibility
        const passInput = document.getElementById('password');
        const toggleBtn = passInput.nextElementSibling;
        
        toggleBtn.addEventListener('click', () => {
            const isPass = passInput.type === 'password';
            passInput.type = isPass ? 'text' : 'password';
            toggleBtn.querySelector('span').innerText = isPass ? 'visibility_off' : 'visibility';
        });

        // Form Animation on Focus
        const inputs = document.querySelectorAll('input[type="email"], input[type="password"]');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.classList.add('scale-[1.01]');
                input.parentElement.parentElement.classList.add('transition-transform');
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.classList.remove('scale-[1.01]');
            });
        });
    </script>
